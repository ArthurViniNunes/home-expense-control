name: CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Back-end
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Obter código-fonte
        uses: actions/checkout@v6

      - name: Configurar .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Exibir versão do .NET
        run: dotnet --version

      - name: Restaurar ferramentas locais
        run: dotnet tool restore

      - name: Restaurar dependências
        run: >
          dotnet restore HomeExpenseControl.sln
          -p:NuGetAuditMode=all
          -p:WarningsAsErrors=NU1901%3BNU1902%3BNU1903%3BNU1904

      - name: Verificar formatação
        run: >
          dotnet format HomeExpenseControl.sln
          --verify-no-changes
          --no-restore

      - name: Compilar
        run: >
          dotnet build HomeExpenseControl.sln
          --configuration Release
          --no-restore

      - name: Executar testes
        run: >
          dotnet test HomeExpenseControl.sln
          --configuration Release
          --no-build
          --verbosity normal

  frontend:
    name: Front-end
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: src/frontend

    steps:
      - name: Obter código-fonte
        uses: actions/checkout@v6

      - name: Configurar Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Exibir versões
        run: |
          node --version
          npm --version

      - name: Instalar dependências
        run: npm ci

      - name: Executar lint
        run: npm run lint

      - name: Gerar build
        run: npm run build